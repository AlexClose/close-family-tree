<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Close Family Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Lato',sans-serif;background:#0a0f1e;color:#c9d1d9;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0d1f3c,#0a0f1e);border-bottom:1px solid #1e3a5f;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-title{font-family:'Playfair Display',serif;font-size:20px;color:#60a5fa;letter-spacing:1px;}
.hdr-sub{font-size:11px;color:#4a6080;margin-top:2px;}
.hdr-status{font-size:10px;padding:3px 8px;border-radius:10px;background:#0f2a1a;color:#4ade80;border:1px solid #166534;}

/* TABS */
.tabs{display:flex;background:#070c18;border-bottom:1px solid #1e3a5f;flex-shrink:0;}
.tab{flex:1;padding:11px 4px;background:none;border:none;border-bottom:2px solid transparent;color:#4a6080;cursor:pointer;font-size:13px;font-family:'Lato',sans-serif;transition:all 0.2s;}
.tab.active{color:#60a5fa;border-bottom-color:#60a5fa;background:#0a0f1e;}

/* LAYOUT */
.layout{display:flex;flex:1;overflow:hidden;}
.tree-col{flex:1;overflow-y:auto;padding:16px;}
.detail-col{width:300px;background:#0d1525;border-left:1px solid #1e3a5f;overflow-y:auto;flex-shrink:0;display:none;}
.detail-col.open{display:block;}

/* PERSON CARDS */
.gen-block{margin-bottom:24px;}
.gen-label{text-align:center;font-size:10px;letter-spacing:3px;color:#2d5a8e;text-transform:uppercase;margin-bottom:10px;font-family:'Playfair Display',serif;}
.cards{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.card{position:relative;padding:10px 12px;border-radius:10px;cursor:pointer;min-width:130px;max-width:170px;border:2px solid;transition:transform 0.15s,box-shadow 0.15s;user-select:none;}
.card:active{transform:scale(0.97);}
.card.male{background:#0c1f35;border-color:#1e4a7a;}
.card.female{background:#1f0c2d;border-color:#6b21a8;}
.card.sel.male{background:#1a3a6a;border-color:#60a5fa;box-shadow:0 0 16px rgba(96,165,250,0.4);}
.card.sel.female{background:#4a1a7a;border-color:#c084fc;box-shadow:0 0 16px rgba(192,132,252,0.4);}
.card-name{font-size:12px;font-weight:700;color:#e2e8f0;line-height:1.3;margin-bottom:3px;}
.card-dates{font-size:10px;color:#4a6080;}
.card-place{font-size:10px;color:#3a5070;margin-top:1px;}
.card-bar{height:3px;background:#070c18;border-radius:2px;margin-top:6px;overflow:hidden;}
.card-fill{height:100%;border-radius:2px;}
.card-badge{position:absolute;top:5px;right:5px;font-size:9px;background:#d97706;color:#000;border-radius:8px;padding:1px 4px;font-weight:700;}

/* DETAIL PANEL */
.dpanel{padding:16px;}
.dpanel-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.dpanel-gen{font-size:10px;color:#4a6080;text-transform:uppercase;letter-spacing:1px;}
.dpanel-name{font-family:'Playfair Display',serif;font-size:18px;color:#60a5fa;line-height:1.2;margin-top:2px;}
.dpanel-dates{font-size:12px;color:#4a6080;margin-top:2px;}
.close-btn{background:none;border:none;color:#4a6080;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;}

.prog-row{display:flex;justify-content:space-between;font-size:11px;color:#4a6080;margin-bottom:4px;}
.prog-track{background:#070c18;border-radius:4px;height:5px;margin-bottom:14px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width 0.3s;}

.dblock{background:#070c18;border-radius:8px;padding:12px;margin-bottom:10px;}
.dblock-title{font-size:10px;color:#1e4a7a;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:'Playfair Display',serif;}
.vital-row{display:flex;justify-content:space-between;margin-bottom:5px;}
.vital-lbl{font-size:12px;color:#4a6080;}
.vital-val{font-size:12px;color:#c9d1d9;}
.vital-val.empty{color:#1e3050;font-style:italic;}
.notes-txt{font-size:12px;color:#c9d1d9;line-height:1.6;}

.rec-card{border-left:3px solid;padding-left:10px;margin-bottom:8px;}
.rec-type{font-size:10px;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.rec-text{font-size:12px;color:#c9d1d9;line-height:1.5;}

.inp{width:100%;padding:7px 10px;margin-bottom:8px;background:#0d1525;border:1px solid #1e3a5f;border-radius:5px;color:#c9d1d9;font-size:13px;font-family:'Lato',sans-serif;}
.inp:focus{outline:none;border-color:#60a5fa;}
textarea.inp{resize:vertical;}
.btn-add{width:100%;padding:9px;background:#0c1f35;border:1px solid #1e4a7a;border-radius:6px;color:#60a5fa;cursor:pointer;font-size:13px;font-family:'Lato',sans-serif;}
.btn-edit{width:100%;padding:9px;background:#0c2a1a;border:1px solid #166534;border-radius:6px;color:#4ade80;cursor:pointer;font-size:13px;font-family:'Lato',sans-serif;margin-top:6px;}
.btn-save{flex:1;padding:9px;background:#0c2a1a;border:1px solid #166534;border-radius:6px;color:#4ade80;cursor:pointer;font-size:13px;font-family:'Lato',sans-serif;}
.btn-cancel{flex:1;padding:9px;background:#2a0c0c;border:1px solid #7f1d1d;border-radius:6px;color:#f87171;cursor:pointer;font-size:13px;font-family:'Lato',sans-serif;}
.field-lbl{display:block;font-size:10px;color:#4a6080;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.field-wrap{margin-bottom:10px;}

/* MOBILE OVERLAY */
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0d1525;z-index:100;overflow-y:auto;}
.overlay.open{display:block;}

/* LIST VIEW */
.list-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:8px;cursor:pointer;border:1px solid #1e3a5f;margin-bottom:6px;transition:background 0.15s;}
.list-item:active{background:#1a2a3a;}
.list-item.male{background:#080f1a;}
.list-item.female{background:#100818;}
.li-name{font-size:14px;color:#e2e8f0;font-weight:700;}
.li-meta{font-size:11px;color:#4a6080;margin-top:2px;}

/* RESEARCH VIEW */
.res-card{background:#0d1525;border:1px solid #1e3a5f;border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer;}
.res-card:active{background:#1a2a3a;}
.res-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.res-name{font-size:14px;color:#e2e8f0;font-weight:700;}
.res-note{font-size:11px;color:#d97706;margin-top:5px;line-height:1.4;}

/* LEGEND */
.legend{text-align:center;font-size:11px;color:#3a5070;padding:10px 0 4px;}

/* MOBILE back button */
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:#60a5fa;font-size:14px;cursor:pointer;padding:12px 16px;font-family:'Lato',sans-serif;}

@media(min-width:700px){
  .detail-col{display:block;}
  .overlay{display:none!important;}
}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-title">⚜ Close Family Tree</div>
    <div class="hdr-sub">Father's Line · Researched with Claude AI</div>
  </div>
  <div class="hdr-status" id="status">Loading...</div>
</div>

<div class="tabs">
  <button class="tab active" onclick="setView('tree')">🌳 Tree</button>
  <button class="tab" onclick="setView('list')">📋 List</button>
  <button class="tab" onclick="setView('research')">🔍 Research</button>
</div>

<div class="layout">
  <div class="tree-col" id="main-col">
    <div style="text-align:center;padding:40px;color:#4a6080;">Loading family tree...</div>
  </div>
  <div class="detail-col" id="detail-col">
    <div style="padding:30px;text-align:center;color:#4a6080;">
      <div style="font-size:40px;margin-bottom:10px;">⚜</div>
      <div style="font-family:'Playfair Display',serif;font-size:18px;color:#60a5fa;">Close Family Tree</div>
      <div style="font-size:12px;margin-top:6px;">Tap any ancestor to view details</div>
    </div>
  </div>
</div>

<!-- Mobile detail overlay -->
<div class="overlay" id="mobile-overlay">
  <button class="back-btn" onclick="closeOverlay()">← Back to tree</button>
  <div id="overlay-content"></div>
</div>

<!-- Firebase SDKs (non-module, compat version for max browser support) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── FIREBASE INIT ─────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBpEF35jkXsNQUDkPcnLgBE-TKOnUATJwI",
  authDomain: "close-family-tree.firebaseapp.com",
  databaseURL: "https://close-family-tree-default-rtdb.firebaseio.com",
  projectId: "close-family-tree",
  storageBucket: "close-family-tree.firebasestorage.app",
  messagingSenderId: "336375211042",
  appId: "1:336375211042:web:fecc64a90f171935da167b"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.database();

// ── INITIAL DATA ──────────────────────────────────────────────
var INITIAL_DATA = {
  "alexander":{"id":"alexander","name":"Alexander Kenneth Close","born":"2001","birthPlace":"","died":"Living","deathPlace":"","gender":"male","parentIds":["richard"],"notes":"Starting point of this family tree.","records":[],"generation":0},
  "richard":{"id":"richard","name":"Richard Emerson Close","born":"May 20, 1948","birthPlace":"Pennsylvania","died":"Living","deathPlace":"","gender":"male","parentIds":["lewis"],"notes":"Father of Alexander Kenneth Close.","records":[],"generation":1},
  "lewis":{"id":"lewis","name":"Lewis Frederick Close","born":"1910","birthPlace":"Philadelphia, Pennsylvania","died":"1970","deathPlace":"","gender":"male","parentIds":["frederick_john","lilly"],"notes":"Born in Philadelphia. Still in Philadelphia in 1930 and 1935. Primary research target.","records":[{"type":"Research Note","text":"WWII Draft Card likely exists — born 1910, would have registered ~1940. Search FamilySearch or Fold3 for Pennsylvania WWII draft cards.","date":"2026"}],"generation":2},
  "catherine_wormeck":{"id":"catherine_wormeck","name":"Catherine M. Wormeck","born":"1912","birthPlace":"","died":"1992","deathPlace":"","gender":"female","parentIds":["rudolph_wormeck","emma_lange"],"notes":"Wife of Lewis Frederick Close. Mother of Richard Emerson Close.","records":[],"generation":2},
  "frederick_john":{"id":"frederick_john","name":"Frederick John Close","born":"1881","birthPlace":"","died":"1969","deathPlace":"","gender":"male","parentIds":["frederic_close_jr","ernestine_grischke"],"notes":"Father of Lewis Frederick Close. Lived 1881-1969.","records":[{"type":"Research Note","text":"WWI Draft Card likely exists — born 1881, would have registered 1917-1918. Search FamilySearch WWI draft records for Pennsylvania.","date":"2026"}],"generation":3},
  "lilly":{"id":"lilly","name":"Lilly F.H. Hartzell","born":"1878","birthPlace":"","died":"1956","deathPlace":"","gender":"female","parentIds":["jacob_hartzell","mary_wonsidler"],"notes":"Mother of Lewis Frederick Close. Wife of Frederick John Close.","records":[],"generation":3},
  "rudolph_wormeck":{"id":"rudolph_wormeck","name":"Rudolph F. Wormeck","born":"1882","birthPlace":"","died":"1949","deathPlace":"","gender":"male","parentIds":["gottfried_wormeck","catherine_orlich"],"notes":"Father of Catherine M. Wormeck.","records":[{"type":"Research Note","text":"WWI Draft Card likely exists — born 1882. Search FamilySearch WWI draft records.","date":"2026"}],"generation":3},
  "emma_lange":{"id":"emma_lange","name":"Emma Elizabeth Lange","born":"1886","birthPlace":"","died":"1962","deathPlace":"","gender":"female","parentIds":["ernst_lange","mary_vetter"],"notes":"Mother of Catherine M. Wormeck.","records":[],"generation":3},
  "frederic_close_jr":{"id":"frederic_close_jr","name":"Frederic Close Jr.","born":"","birthPlace":"","died":"","deathPlace":"","gender":"male","parentIds":["friederich_clos"],"notes":"Son of Friederich Clos. Father of Frederick John Close.","records":[],"generation":4},
  "ernestine_grischke":{"id":"ernestine_grischke","name":"Ernestine M.M. Grischke","born":"","birthPlace":"","died":"","deathPlace":"","gender":"female","parentIds":[],"notes":"Wife of Frederic Close Jr.","records":[],"generation":4},
  "jacob_hartzell":{"id":"jacob_hartzell","name":"Jacob R. Hartzell","born":"","birthPlace":"","died":"","deathPlace":"","gender":"male","parentIds":[],"notes":"Father of Lilly F.H. Hartzell.","records":[],"generation":4},
  "mary_wonsidler":{"id":"mary_wonsidler","name":"Mary Jane Wonsidler","born":"","birthPlace":"","died":"","deathPlace":"","gender":"female","parentIds":[],"notes":"Mother of Lilly F.H. Hartzell.","records":[],"generation":4},
  "gottfried_wormeck":{"id":"gottfried_wormeck","name":"Gottfried J. Wormeck","born":"","birthPlace":"","died":"","deathPlace":"","gender":"male","parentIds":[],"notes":"Father of Rudolph F. Wormeck.","records":[],"generation":4},
  "catherine_orlich":{"id":"catherine_orlich","name":"Catherine Orlich","born":"","birthPlace":"","died":"","deathPlace":"","gender":"female","parentIds":[],"notes":"Mother of Rudolph F. Wormeck.","records":[],"generation":4},
  "ernst_lange":{"id":"ernst_lange","name":"Ernst \"Ernest\" H. Lange","born":"","birthPlace":"","died":"","deathPlace":"","gender":"male","parentIds":[],"notes":"Father of Emma Elizabeth Lange.","records":[],"generation":4},
  "mary_vetter":{"id":"mary_vetter","name":"Mary Rosina Vetter","born":"","birthPlace":"","died":"","deathPlace":"","gender":"female","parentIds":[],"notes":"Mother of Emma Elizabeth Lange.","records":[],"generation":4},
  "friederich_clos":{"id":"friederich_clos","name":"Friederich Clos","born":"1830","birthPlace":"Germany","died":"1897","deathPlace":"","gender":"male","parentIds":["clos_ancestor","anna_drumm"],"notes":"German immigrant ancestor. Key research target.","records":[{"type":"Research Note","text":"Search German church records via Archion.de or Matricula-online.eu. Need to identify the specific village in Germany.","date":"2026"},{"type":"Research Note","text":"Look for naturalization or immigration ship manifest — could reveal exact German hometown.","date":"2026"}],"generation":5},
  "philippina_seil":{"id":"philippina_seil","name":"Philippina Bena Seil","born":"1828","birthPlace":"","died":"1913","deathPlace":"","gender":"female","parentIds":["johann_seyl","karolina_knapp"],"notes":"Wife of Friederich Clos.","records":[],"generation":5},
  "clos_ancestor":{"id":"clos_ancestor","name":"Clos / Claus / Closs","born":"1779","birthPlace":"Germany","died":"1846","deathPlace":"","gender":"male","parentIds":[],"notes":"Earliest known Close/Clos ancestor. German origin confirmed.","records":[],"generation":6},
  "anna_drumm":{"id":"anna_drumm","name":"Anna M.E. Drumm","born":"1784","birthPlace":"Germany","died":"1848","deathPlace":"","gender":"female","parentIds":[],"notes":"Wife of Clos/Claus/Closs. German origin.","records":[],"generation":6},
  "johann_seyl":{"id":"johann_seyl","name":"Johann Georg Seyl","born":"1795","birthPlace":"Germany","died":"1873","deathPlace":"","gender":"male","parentIds":[],"notes":"German ancestor. Father of Philippina Bena Seil.","records":[],"generation":6},
  "karolina_knapp":{"id":"karolina_knapp","name":"Karolina Knapp","born":"1794","birthPlace":"","died":"","deathPlace":"","gender":"female","parentIds":[],"notes":"Mother of Philippina Bena Seil.","records":[],"generation":6}
};

// ── STATE ─────────────────────────────────────────────────────
var people = {};
var selectedId = null;
var currentView = 'tree';
var editingId = null;
var isMobile = window.innerWidth < 700;

var GEN_LABELS = ["You","Father","Grandparents","Great-Grandparents","2× Great-Grandparents","3× Great-Grandparents","4× Great-Grandparents"];

// ── FIREBASE LOAD ─────────────────────────────────────────────
db.ref('closeFamily/people').on('value', function(snap) {
  var data = snap.val();
  if (!data) {
    db.ref('closeFamily/people').set(INITIAL_DATA);
    people = INITIAL_DATA;
  } else {
    people = data;
  }
  document.getElementById('status').textContent = Object.keys(people).length + ' ancestors';
  render();
}, function(err) {
  console.warn('Firebase error:', err);
  people = INITIAL_DATA;
  document.getElementById('status').textContent = 'Offline mode';
  render();
});

// ── HELPERS ───────────────────────────────────────────────────
function getProgress(p) {
  var s = 0;
  if (p.born) s++;
  if (p.birthPlace) s++;
  if (p.died) s++;
  if (p.deathPlace) s++;
  if (p.notes && p.notes.length > 40) s++;
  if (p.records && p.records.some(function(r){return r.type !== 'Research Note';})) s += 2;
  return Math.min(100, Math.round((s/7)*100));
}
function pc(n){ return n>60?'#4ade80':n>30?'#fbbf24':'#f87171'; }

function savePerson(id, data) {
  people[id] = data;
  db.ref('closeFamily/people/'+id).set(data);
}

// ── RENDER MAIN ───────────────────────────────────────────────
function render() {
  isMobile = window.innerWidth < 700;
  var tabs = document.querySelectorAll('.tab');
  tabs.forEach(function(t,i){ t.classList.remove('active'); });
  var viewMap = {tree:0,list:1,research:2};
  tabs[viewMap[currentView]].classList.add('active');

  var col = document.getElementById('main-col');
  if (currentView === 'tree') col.innerHTML = renderTree();
  else if (currentView === 'list') col.innerHTML = renderList();
  else col.innerHTML = renderResearch();

  if (!isMobile) {
    var dc = document.getElementById('detail-col');
    dc.style.display = 'block';
    dc.innerHTML = selectedId ? renderPanel(false) : renderWelcome();
    attachPanelListeners();
  }
}

function renderWelcome() {
  return '<div style="padding:30px;text-align:center;color:#4a6080;">' +
    '<div style="font-size:40px;margin-bottom:10px;">⚜</div>' +
    '<div style="font-family:Playfair Display,serif;font-size:18px;color:#60a5fa;">Close Family Tree</div>' +
    '<div style="font-size:12px;margin-top:8px;line-height:1.6;">Tap any ancestor to view their details, vital records, and research notes.</div>' +
    '<div style="margin-top:20px;text-align:left;">' +
    GEN_LABELS.map(function(l,i){
      return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;">' +
        '<span style="width:10px;height:10px;border-radius:50%;background:hsl('+(200-i*15)+',60%,'+(45-i*4)+'%);flex-shrink:0;display:inline-block;"></span>' +
        '<span>'+l+'</span></div>';
    }).join('') +
    '</div></div>';
}

// ── TREE ──────────────────────────────────────────────────────
function renderTree() {
  var gens = {};
  Object.values(people).forEach(function(p){
    if (!gens[p.generation]) gens[p.generation] = [];
    gens[p.generation].push(p);
  });
  var html = '<div>';
  Object.keys(gens).sort(function(a,b){return a-b;}).forEach(function(g){
    html += '<div class="gen-block"><div class="gen-label">'+(GEN_LABELS[g]||'Generation '+g)+'</div><div class="cards">';
    gens[g].forEach(function(p){ html += renderCard(p); });
    html += '</div></div>';
  });
  html += '<div class="legend">🟢 Well documented · 🟡 Partial · 🔴 Needs research</div></div>';
  return html;
}

function renderCard(p) {
  var prog = getProgress(p);
  var isSel = selectedId === p.id;
  var cl = 'card '+p.gender+(isSel?' sel':'');
  var badge = (p.records && p.records.length) ? '<div class="card-badge">'+p.records.length+'</div>' : '';
  return '<div class="'+cl+'" onclick="selectPerson(\''+p.id+'\')">'+
    badge+
    '<div class="card-name">'+p.name+'</div>'+
    ((p.born||p.died)?'<div class="card-dates">'+(p.born||'?')+' – '+(p.died||'?')+'</div>':'')+
    (p.birthPlace?'<div class="card-place">📍 '+p.birthPlace+'</div>':'')+
    '<div class="card-bar"><div class="card-fill" style="width:'+prog+'%;background:'+pc(prog)+'"></div></div>'+
    '</div>';
}

// ── LIST ──────────────────────────────────────────────────────
function renderList() {
  var sorted = Object.values(people).sort(function(a,b){return a.generation-b.generation;});
  var html = '<div style="padding-bottom:20px;">';
  sorted.forEach(function(p){
    var prog = getProgress(p);
    html += '<div class="list-item '+p.gender+'" onclick="selectPerson(\''+p.id+'\')">'+
      '<div style="flex:1;">'+
        '<div class="li-name">'+p.name+'</div>'+
        '<div class="li-meta">'+(GEN_LABELS[p.generation]||'')+' · '+(p.born||'?')+' – '+(p.died||'?')+(p.birthPlace?' · '+p.birthPlace:'')+'</div>'+
      '</div>'+
      '<div style="text-align:right;font-size:11px;color:'+pc(prog)+';">'+prog+'%</div>'+
      '</div>';
  });
  return html + '</div>';
}

// ── RESEARCH ──────────────────────────────────────────────────
function renderResearch() {
  var sorted = Object.values(people).filter(function(p){return p.generation>0;})
    .sort(function(a,b){return getProgress(a)-getProgress(b);});
  var html = '<div style="padding-bottom:20px;"><div style="font-size:12px;color:#4a6080;margin-bottom:12px;">Sorted by research priority — most needed first:</div>';
  sorted.forEach(function(p){
    var prog = getProgress(p);
    var notes = (p.records||[]).filter(function(r){return r.type==='Research Note';});
    html += '<div class="res-card" onclick="selectPerson(\''+p.id+'\')">'+
      '<div class="res-top"><div class="res-name">'+p.name+'</div><div style="font-size:11px;color:'+pc(prog)+';">'+prog+'%</div></div>'+
      '<div class="prog-track" style="margin-bottom:6px;"><div class="prog-fill" style="width:'+prog+'%;background:'+pc(prog)+';"></div></div>'+
      '<div style="font-size:11px;color:#4a6080;">'+(GEN_LABELS[p.generation]||'')+' · '+(p.born||'unknown')+' · '+(p.birthPlace||'unknown location')+'</div>'+
      notes.map(function(n){return '<div class="res-note">💡 '+n.text+'</div>';}).join('')+
      '</div>';
  });
  return html + '</div>';
}

// ── PANEL ─────────────────────────────────────────────────────
function renderPanel(forOverlay) {
  if (editingId) return renderEditPanel(forOverlay);
  var p = people[selectedId];
  if (!p) return renderWelcome();
  var prog = getProgress(p);
  var records = p.records || [];
  var findings = records.filter(function(r){return r.type!=='Research Note';});
  var resNotes = records.filter(function(r){return r.type==='Research Note';});

  var backBtn = forOverlay ? '' : '<button class="close-btn" onclick="closePanel()">✕</button>';

  return '<div class="dpanel">'+
    '<div class="dpanel-top">'+
      '<div>'+
        '<div class="dpanel-gen">'+(GEN_LABELS[p.generation]||'')+'</div>'+
        '<div class="dpanel-name">'+p.name+'</div>'+
        '<div class="dpanel-dates">'+(p.born||'?')+' – '+(p.died||'?')+'</div>'+
      '</div>'+
      backBtn+
    '</div>'+

    '<div class="prog-row"><span>Research Progress</span><span style="color:'+pc(prog)+';">'+prog+'%</span></div>'+
    '<div class="prog-track"><div class="prog-fill" style="width:'+prog+'%;background:'+pc(prog)+';"></div></div>'+

    '<div class="dblock"><div class="dblock-title">Vital Records</div>'+
      vr('Born',p.born)+vr('Birthplace',p.birthPlace)+vr('Died',p.died)+vr('Death Place',p.deathPlace)+
    '</div>'+

    (p.notes?'<div class="dblock"><div class="dblock-title">Notes</div><div class="notes-txt">'+p.notes+'</div></div>':'')+

    (findings.length?'<div class="dblock"><div class="dblock-title">✅ Confirmed Records ('+findings.length+')</div>'+
      findings.map(function(r){return rc(r,'#4ade80');}).join('')+'</div>':'')+

    (resNotes.length?'<div class="dblock"><div class="dblock-title">💡 Research Notes ('+resNotes.length+')</div>'+
      resNotes.map(function(r){return rc(r,'#fbbf24');}).join('')+'</div>':'')+

    '<div class="dblock"><div class="dblock-title">Add Record</div>'+
      '<select id="rec-type" class="inp"><option value="">Select type...</option>'+
      '<option>Census Record</option><option>Birth Certificate</option><option>Death Certificate</option>'+
      '<option>Marriage Record</option><option>Military / Draft Record</option><option>Immigration Record</option>'+
      '<option>Church Record</option><option>Newspaper</option><option>Research Note</option><option>Other</option>'+
      '</select>'+
      '<textarea id="rec-text" class="inp" rows="3" placeholder="Paste record details or notes here..."></textarea>'+
      '<button class="btn-add" id="add-rec-btn">+ Add Record</button>'+
    '</div>'+

    '<button class="btn-edit" id="edit-btn" onclick="startEdit(\''+p.id+'\')">✏️ Edit Details</button>'+
    '</div>';
}

function vr(label, val) {
  return '<div class="vital-row"><span class="vital-lbl">'+label+'</span><span class="vital-val'+(val?'':' empty')+'">'+(val||'Unknown')+'</span></div>';
}
function rc(r, color) {
  return '<div class="rec-card" style="border-left-color:'+color+';">'+
    '<div class="rec-type" style="color:'+color+';">'+(r.type||'Record')+(r.date?' · '+r.date:'')+'</div>'+
    '<div class="rec-text">'+r.text+'</div></div>';
}

function renderEditPanel(forOverlay) {
  var p = people[editingId];
  var backBtn = forOverlay ? '' : '<button class="close-btn" onclick="cancelEdit()">✕</button>';
  return '<div class="dpanel">'+
    '<div class="dpanel-top">'+
      '<div class="dpanel-name" style="color:#4ade80;">✏️ Editing</div>'+
      backBtn+
    '</div>'+
    '<div style="font-size:13px;color:#c9d1d9;margin-bottom:14px;">'+p.name+'</div>'+
    ef('Full Name','e-name',p.name)+
    ef('Birth Date','e-born',p.born)+
    ef('Birth Place','e-birthplace',p.birthPlace)+
    ef('Death Date','e-died',p.died)+
    ef('Death Place','e-deathplace',p.deathPlace)+
    '<div class="field-wrap"><label class="field-lbl">Notes</label>'+
    '<textarea id="e-notes" class="inp" rows="5">'+( p.notes||'')+'</textarea></div>'+
    '<div style="display:flex;gap:8px;">'+
    '<button class="btn-save" id="save-edit-btn">💾 Save</button>'+
    '<button class="btn-cancel" onclick="cancelEdit()">Cancel</button>'+
    '</div></div>';
}
function ef(label, id, val) {
  return '<div class="field-wrap"><label class="field-lbl">'+label+'</label>'+
    '<input id="'+id+'" class="inp" value="'+(val||'')+'"></div>';
}

// ── LISTENERS ─────────────────────────────────────────────────
function attachPanelListeners() {
  var addBtn = document.getElementById('add-rec-btn');
  if (addBtn) {
    addBtn.addEventListener('click', function(){
      var type = (document.getElementById('rec-type')||{}).value||'Other';
      var text = ((document.getElementById('rec-text')||{}).value||'').trim();
      if (!text || !selectedId) return;
      var p = people[selectedId];
      var recs = (p.records||[]).concat([{type:type,text:text,date:new Date().toLocaleDateString()}]);
      savePerson(selectedId, Object.assign({},p,{records:recs}));
      document.getElementById('rec-text').value='';
    });
  }
  var saveBtn = document.getElementById('save-edit-btn');
  if (saveBtn) {
    saveBtn.addEventListener('click', function(){
      var p = people[editingId];
      var updated = Object.assign({},p,{
        name: document.getElementById('e-name').value||p.name,
        born: document.getElementById('e-born').value||'',
        birthPlace: document.getElementById('e-birthplace').value||'',
        died: document.getElementById('e-died').value||'',
        deathPlace: document.getElementById('e-deathplace').value||'',
        notes: document.getElementById('e-notes').value||''
      });
      savePerson(editingId, updated);
      selectedId = editingId;
      editingId = null;
    });
  }
}

// ── GLOBAL ACTIONS ────────────────────────────────────────────
function selectPerson(id) {
  selectedId = id;
  editingId = null;
  isMobile = window.innerWidth < 700;
  if (isMobile) {
    var ov = document.getElementById('mobile-overlay');
    var oc = document.getElementById('overlay-content');
    oc.innerHTML = renderPanel(true);
    ov.classList.add('open');
    attachPanelListeners();
  } else {
    render();
  }
  // re-render cards to show selection highlight
  var mainCol = document.getElementById('main-col');
  if (currentView === 'tree') mainCol.innerHTML = renderTree();
}

function closePanel() { selectedId = null; editingId = null; render(); }
function closeOverlay() {
  document.getElementById('mobile-overlay').classList.remove('open');
}
function setView(v) { currentView = v; render(); }
function startEdit(id) {
  editingId = id;
  isMobile = window.innerWidth < 700;
  if (isMobile) {
    var oc = document.getElementById('overlay-content');
    oc.innerHTML = renderEditPanel(true);
    attachPanelListeners();
  } else {
    render();
  }
}
function cancelEdit() {
  editingId = null;
  isMobile = window.innerWidth < 700;
  if (isMobile) {
    var oc = document.getElementById('overlay-content');
    oc.innerHTML = renderPanel(true);
    attachPanelListeners();
  } else {
    render();
  }
}

window.selectPerson = selectPerson;
window.closePanel = closePanel;
window.closeOverlay = closeOverlay;
window.setView = setView;
window.startEdit = startEdit;
window.cancelEdit = cancelEdit;
</script>
</body>
</html>
